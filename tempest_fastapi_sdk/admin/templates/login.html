{% extends "base.html" %}
{% block title %}Sign in · {{ site.title }}{% endblock %}
{% block content %}
<section class="tempest-admin-login">
  <h1>Sign in</h1>
  <p>{{ site.index_subtitle }}</p>
  {% if error %}
  <p class="tempest-admin-login__error" role="alert">{{ error }}</p>
  {% endif %}
  <form method="post" action="{{ url_for('admin_login') }}" class="tempest-admin-login__form">
    <label>
      <span>Email</span>
      <input type="email" name="identifier" autocomplete="username" required autofocus>
    </label>
    <label>
      <span>Password</span>
      <input type="password" name="password" autocomplete="current-password" required>
    </label>
    <button type="submit">Sign in</button>
  </form>
</section>
{% endblock %}
