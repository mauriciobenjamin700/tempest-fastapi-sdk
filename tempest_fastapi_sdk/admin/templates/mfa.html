{% extends "base.html" %}
{% block title %}Two-factor · {{ site.title }}{% endblock %}
{% block content %}
<section class="tempest-admin-login">
  <h1>Two-factor authentication</h1>
  <p>Enter the 6-digit code from your authenticator app.</p>
  {% if error %}
  <p class="tempest-admin-login__error" role="alert">{{ error }}</p>
  {% endif %}
  <form method="post" action="{{ url_for('admin_mfa_submit') }}" class="tempest-admin-login__form">
    <input type="hidden" name="csrf_token" value="{{ session.csrf_token }}">
    <label>
      <span>Authentication code</span>
      <input type="text" name="code" inputmode="numeric" autocomplete="one-time-code"
             pattern="[0-9 -]*" maxlength="16" required autofocus>
    </label>
    <button type="submit">Verify</button>
  </form>
</section>
{% endblock %}
