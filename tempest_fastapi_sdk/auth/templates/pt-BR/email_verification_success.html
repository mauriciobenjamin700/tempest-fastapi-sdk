<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>E-mail verificado</title>
</head>
<body style="font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; line-height: 1.5; color: #1f2937; max-width: 480px; margin: 0 auto; padding: 24px;">
  <div style="text-align: center; padding: 40px 0;">
    <div style="font-size: 64px; line-height: 1;">&#9989;</div>
    <h1 style="color: #111827; margin-top: 16px;">E-mail verificado</h1>
    <p style="color: #4b5563;">O e-mail <strong>{{ user.email if user else "da sua conta" }}</strong> foi verificado com sucesso.</p>
    {% if login_url %}
      <p style="margin-top: 32px;">
        <a href="{{ login_url }}"
           style="display: inline-block; padding: 12px 24px; background: #2563eb; color: white; text-decoration: none; border-radius: 6px;">
          Ir para o login
        </a>
      </p>
    {% endif %}
  </div>
</body>
</html>
