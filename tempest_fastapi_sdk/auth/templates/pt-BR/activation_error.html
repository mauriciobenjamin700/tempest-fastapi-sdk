<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Falha na ativação</title>
</head>
<body style="font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; line-height: 1.5; color: #1f2937; max-width: 480px; margin: 0 auto; padding: 24px;">
  <div style="text-align: center; padding: 40px 0;">
    <div style="font-size: 64px; line-height: 1;">&#9888;&#65039;</div>
    <h1 style="color: #b91c1c; margin-top: 16px;">Falha na ativação</h1>
    <p style="color: #4b5563;">{{ reason or "Este link de ativação não é mais válido." }}</p>
    <p style="color: #6b7280; font-size: 14px; margin-top: 16px;">
      O link pode ter expirado, já ter sido usado ou nunca ter existido.
      Solicite uma nova conta ou cadastre-se novamente para receber um novo e-mail de ativação.
    </p>
    {% if login_url %}
      <p style="margin-top: 32px;">
        <a href="{{ login_url }}"
           style="display: inline-block; padding: 12px 24px; background: #2563eb; color: white; text-decoration: none; border-radius: 6px;">
          Ir para o login
        </a>
      </p>
    {% endif %}
  </div>
</body>
</html>
