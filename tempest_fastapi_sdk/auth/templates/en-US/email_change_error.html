<!DOCTYPE html>
<html lang="en-US">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Email change failed</title>
</head>
<body style="font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; line-height: 1.5; color: #1f2937; max-width: 480px; margin: 0 auto; padding: 24px;">
  <div style="text-align: center; padding: 40px 0;">
    <div style="font-size: 64px; line-height: 1;">&#9888;&#65039;</div>
    <h1 style="color: #b91c1c; margin-top: 16px;">Email change failed</h1>
    <p style="color: #4b5563;">{{ reason or "This confirmation link is no longer valid." }}</p>
    <p style="color: #6b7280; font-size: 14px; margin-top: 16px;">
      The link may have expired, already been used, or the address may have been registered by someone else.
      Request the change again.
    </p>
    {% if login_url %}
      <p style="margin-top: 32px;">
        <a href="{{ login_url }}"
           style="display: inline-block; padding: 12px 24px; background: #2563eb; color: white; text-decoration: none; border-radius: 6px;">
          Go to login
        </a>
      </p>
    {% endif %}
  </div>
</body>
</html>
