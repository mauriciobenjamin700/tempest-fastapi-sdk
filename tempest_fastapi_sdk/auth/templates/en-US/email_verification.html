<!DOCTYPE html>
<html lang="en-US">
<head><meta charset="utf-8" /></head>
<body style="font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; line-height: 1.5; color: #1f2937; max-width: 480px; margin: 0 auto; padding: 24px;">
  <h2 style="color: #111827;">Verify your email</h2>
  <p>Confirm that this address ({{ user.email }}) belongs to you.</p>
  <p>Click the button below to verify:</p>
  <p style="margin: 24px 0;">
    <a href="{{ verify_url }}"
       style="display: inline-block; padding: 12px 24px; background: #2563eb; color: white; text-decoration: none; border-radius: 6px;">
      Verify email
    </a>
  </p>
  <p style="color: #6b7280; font-size: 13px;">Or paste this link into your browser:<br />
    <a href="{{ verify_url }}" style="color: #2563eb; word-break: break-all;">{{ verify_url }}</a>
  </p>
  <p style="color: #6b7280; font-size: 13px;">This link expires on <strong>{{ expires_at_str }}</strong>.</p>
</body>
</html>
