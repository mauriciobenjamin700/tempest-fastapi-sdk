<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Reset your password</title>
</head>
<body style="font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; line-height: 1.5; color: #1f2937; max-width: 420px; margin: 0 auto; padding: 24px;">
  <h1 style="color: #111827;">Reset your password</h1>
  <p style="color: #4b5563;">Pick a new password for <strong>{{ user.email if user else "your account" }}</strong>.</p>
  {% if error %}
    <p style="color: #b91c1c; background: #fee2e2; padding: 12px; border-radius: 6px;">{{ error }}</p>
  {% endif %}
  <form method="post" action="{{ form_action }}" style="display: flex; flex-direction: column; gap: 12px; margin-top: 16px;">
    <label for="new_password" style="font-size: 14px; color: #374151;">New password (minimum {{ min_length }} characters)</label>
    <input
      id="new_password"
      name="new_password"
      type="password"
      required
      minlength="{{ min_length }}"
      autocomplete="new-password"
      style="padding: 10px; border: 1px solid #d1d5db; border-radius: 6px; font-size: 16px;"
    />
    <label for="confirm_password" style="font-size: 14px; color: #374151;">Confirm new password</label>
    <input
      id="confirm_password"
      name="confirm_password"
      type="password"
      required
      minlength="{{ min_length }}"
      autocomplete="new-password"
      style="padding: 10px; border: 1px solid #d1d5db; border-radius: 6px; font-size: 16px;"
    />
    <button
      type="submit"
      style="padding: 12px 24px; background: #2563eb; color: white; border: none; border-radius: 6px; font-size: 16px; cursor: pointer; margin-top: 8px;"
    >
      Update password
    </button>
  </form>
</body>
</html>
