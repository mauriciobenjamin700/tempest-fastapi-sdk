site_name: tempest-fastapi-sdk
site_description: >-
  Shared FastAPI/SQLAlchemy/Pydantic building blocks for Tempest projects —
  base schemas, async repository, exceptions, pagination, settings, admin,
  Web Push, Server-Sent Events, FastStream/TaskIQ brokers and Brazilian
  document/phone validation.
site_url: https://mauriciobenjamin700.github.io/tempest-fastapi-sdk/
repo_url: https://github.com/mauriciobenjamin700/tempest-fastapi-sdk
repo_name: mauriciobenjamin700/tempest-fastapi-sdk
edit_uri: edit/main/docs/
copyright: Copyright &copy; 2026 Mauricio Benjamin — MIT License

theme:
  name: material
  language: pt-BR
  features:
    - announce.dismiss
    - content.action.edit
    - content.action.view
    - content.code.annotate
    - content.code.copy
    - content.tabs.link
    - content.tooltips
    - navigation.expand
    - navigation.footer
    - navigation.indexes
    - navigation.path
    - navigation.sections
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.top
    - navigation.tracking
    - search.highlight
    - search.share
    - search.suggest
    - toc.follow
    - toc.integrate
  palette:
    - media: "(prefers-color-scheme)"
      toggle:
        icon: material/brightness-auto
        name: Switch to light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to system preference
  icon:
    repo: fontawesome/brands/github
    edit: material/pencil
    view: material/eye

plugins:
  - search:
      separator: '[\s\-,:!=\[\]()"`/]+|\.(?!\d)|&[lg]t;|(?!\b)(?=[A-Z][a-z])'
  # Seletor de idioma PT-BR / EN-US no header. Arquivos sem sufixo são PT
  # (default); traduções vivem em `<nome>.en.md`. Páginas sem tradução caem
  # para o PT (fallback_to_default).
  - i18n:
      docs_structure: suffix
      fallback_to_default: true
      reconfigure_material: true
      reconfigure_search: true
      languages:
        - locale: pt
          name: Português (BR)
          default: true
          build: true
        - locale: en
          name: English (US)
          build: true
          site_name: tempest-fastapi-sdk
          nav_translations:
            Início: Home
            Instalação: Installation
            Arquitetura: Architecture
            Tutorial: Tutorial
            Receitas: Recipes
            Banco de dados: Database
            Multi-tenant: Multi-tenant
            Audit trail: Audit trail
            Camada HTTP: HTTP layer
            "HTTP client (saída)": "HTTP client (outbound)"
            Cache: Cache
            Feature flags: Feature flags
            Tempo real: Real-time
            WebSocket router: WebSocket router
            Fila e Tarefas: Queue & Tasks
            Outbox transacional: Transactional outbox
            Email transacional: Transactional email
            Web Push: Web Push
            Logging: Logging
            Storage (MinIO/S3): Storage (MinIO/S3)
            Uploads (backends): Uploads (backends)
            Downloads: Downloads
            Idempotência: Idempotency
            "Auth flow (signup/reset)": "Auth flow (signup/reset)"
            "MFA (TOTP / 2FA)": "MFA (TOTP / 2FA)"
            "Sessões server-side": "Server-side sessions"
            Métricas: Metrics
            Painel admin: Admin site
            Testes: Testing
            "Deploy seguro (migrations + shutdown)": "Safe deploys (migrations + shutdown)"
            CLI: CLI
            Segurança: Security
            Utilitários: Utilities
            Helpers brasileiros: Brazilian helpers
            Referência: Reference
            "Projetos de aprendizado": Learning projects
            Marketplace: Marketplace
            "Regras de negócio": Business rules
            "Modelo de domínio": Domain model
            "Fluxos críticos": Critical flows
            "Mapa de endpoints": Endpoint map
            Roadmap: Roadmap
            Guia de migração: Migration guide
            Contribuindo: Contributing
            Changelog: Changelog
  - include-markdown
  - mkdocstrings:
      default_handler: python
      handlers:
        python:
          options:
            show_source: true
            show_root_heading: true
            show_root_full_path: false
            show_object_full_path: false
            show_symbol_type_heading: true
            show_symbol_type_toc: true
            members_order: source
            docstring_style: google
            docstring_section_style: table
            merge_init_into_class: true
            separate_signature: true
            show_signature_annotations: true
            signature_crossrefs: true
            line_length: 88
            filters:
              - "!^_"
          paths: [.]

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
      toc_depth: 4
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.betterem
  - pymdownx.caret
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.magiclink:
      repo_url_shorthand: true
      user: mauriciobenjamin700
      repo: tempest-fastapi-sdk
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.snippets:
      base_path: [., docs]
      check_paths: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
      slugify: !!python/object/apply:pymdownx.slugs.slugify
        kwds:
          case: lower
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde

