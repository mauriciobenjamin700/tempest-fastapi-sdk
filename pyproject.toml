    "mkdocs>=1.6.0",
    "mkdocs-material>=9.5.0",
    "mkdocstrings[python]>=0.27.0",
    "pymdown-extensions>=10.0",
    "mkdocs-include-markdown-plugin>=7.0.0",
    "mkdocs-static-i18n>=1.2",
