[project.urls]
Homepage = "https://github.com/mauriciobenjamin700/tempest-fastapi-sdk"
Repository = "https://github.com/mauriciobenjamin700/tempest-fastapi-sdk"
Issues = "https://github.com/mauriciobenjamin700/tempest-fastapi-sdk/issues"

[project.scripts]
tempest = "tempest_fastapi_sdk.cli.main:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["tempest_fastapi_sdk"]

[tool.hatch.build.targets.wheel.force-include]
"tempest_fastapi_sdk/db/_alembic_templates/env.py.template" = "tempest_fastapi_sdk/db/_alembic_templates/env.py.template"
# Bundled auth templates ship under per-locale subdirs (pt-BR/, en-US/).
"tempest_fastapi_sdk/auth/templates/pt-BR/activation.html" = "tempest_fastapi_sdk/auth/templates/pt-BR/activation.html"
"tempest_fastapi_sdk/auth/templates/pt-BR/password_reset.html" = "tempest_fastapi_sdk/auth/templates/pt-BR/password_reset.html"
"tempest_fastapi_sdk/auth/templates/pt-BR/activation_success.html" = "tempest_fastapi_sdk/auth/templates/pt-BR/activation_success.html"
"tempest_fastapi_sdk/auth/templates/pt-BR/activation_error.html" = "tempest_fastapi_sdk/auth/templates/pt-BR/activation_error.html"
"tempest_fastapi_sdk/auth/templates/pt-BR/password_reset_form.html" = "tempest_fastapi_sdk/auth/templates/pt-BR/password_reset_form.html"
"tempest_fastapi_sdk/auth/templates/pt-BR/password_reset_success.html" = "tempest_fastapi_sdk/auth/templates/pt-BR/password_reset_success.html"
"tempest_fastapi_sdk/auth/templates/pt-BR/password_reset_error.html" = "tempest_fastapi_sdk/auth/templates/pt-BR/password_reset_error.html"
"tempest_fastapi_sdk/auth/templates/en-US/activation.html" = "tempest_fastapi_sdk/auth/templates/en-US/activation.html"
"tempest_fastapi_sdk/auth/templates/en-US/password_reset.html" = "tempest_fastapi_sdk/auth/templates/en-US/password_reset.html"
"tempest_fastapi_sdk/auth/templates/en-US/activation_success.html" = "tempest_fastapi_sdk/auth/templates/en-US/activation_success.html"
"tempest_fastapi_sdk/auth/templates/en-US/activation_error.html" = "tempest_fastapi_sdk/auth/templates/en-US/activation_error.html"
"tempest_fastapi_sdk/auth/templates/en-US/password_reset_form.html" = "tempest_fastapi_sdk/auth/templates/en-US/password_reset_form.html"
"tempest_fastapi_sdk/auth/templates/en-US/password_reset_success.html" = "tempest_fastapi_sdk/auth/templates/en-US/password_reset_success.html"
"tempest_fastapi_sdk/auth/templates/en-US/password_reset_error.html" = "tempest_fastapi_sdk/auth/templates/en-US/password_reset_error.html"
"tempest_fastapi_sdk/utils/data/br_locations.json" = "tempest_fastapi_sdk/utils/data/br_locations.json"
# Locally-bundled HTMX asset for the [ssr] extra (served without a CDN).
"tempest_fastapi_sdk/ssr/_static/htmx.min.js" = "tempest_fastapi_sdk/ssr/_static/htmx.min.js"

