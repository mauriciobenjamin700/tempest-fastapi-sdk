[project]
name = "tempest-fastapi-sdk"
version = "0.126.0"
description = "Shared FastAPI building blocks: base schemas, ORM model, async repository, exceptions, pagination and settings — the conventions used across Tempest projects."
readme = "README.md"
requires-python = ">=3.11"
license = { text = "MIT" }
authors = [
    { name = "Mauricio Benjamin", email = "mauricio.benjamin@reloverelations.com" },
]
keywords = [
    "fastapi",
    "sqlalchemy",
    "pydantic",
    "async",
    "repository",
    "pagination",
    "sdk",
]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Framework :: FastAPI",
    "Framework :: Pydantic :: 2",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3 :: Only",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Software Development :: Libraries :: Python Modules",
    "Typing :: Typed",
]
dependencies = [
    "alembic>=1.18.4",
    "click>=8.0.0",
    "fastapi>=0.118.0",
    "pydantic>=2.13.4",
    "pydantic-settings>=2.6.0",
    "sqlalchemy[asyncio]>=2.0.49",
    "typer>=0.12.0",
]

