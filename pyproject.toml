[tool.ruff]
line-length = 88
target-version = "py311"
src = [".", "tests"]

[tool.ruff.lint]
select = [
    "E",
    "W",
    "F",
    "I",
    "B",
    "C4",
    "UP",
    "N",
    "SIM",
    "RUF",
    "ANN",
]
ignore = [
    "B008",
    "B006",
    "UP046",
    # ``Any`` is a legitimate annotation. We enforce that things ARE
    # annotated, never that they avoid ``Any`` -- so ANN401 stays off.
    "ANN401",
    # ``*args`` / ``**kwargs`` annotations add noise for the thin
    # passthrough wrappers the SDK exposes.
    "ANN002",
    "ANN003",
]

[tool.ruff.lint.per-file-ignores]
"tests/*" = ["S101"]
"**/__init__.py" = ["F401"]
"tempest_fastapi_sdk/db/repository.py" = ["UP006", "UP035"]
# Renders YAML compose snippets as f-string literals — long lines
# (healthcheck commands, `mc` entrypoints) are content, not code.
"tempest_fastapi_sdk/cli/docker_compose.py" = ["E501"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"

[tool.mypy]
python_version = "3.11"
strict = true
warn_return_any = true
warn_unused_configs = true
disallow_untyped_defs = true
disallow_incomplete_defs = true
check_untyped_defs = true
disallow_untyped_decorators = true
no_implicit_optional = true
warn_redundant_casts = true
warn_unused_ignores = true
warn_no_return = true
warn_unreachable = true
strict_equality = true
plugins = ["pydantic.mypy"]

[[tool.mypy.overrides]]
module = ["tests.*"]
disallow_untyped_defs = false

[[tool.mypy.overrides]]
module = [
    "aiosmtplib.*",
    "aiofiles.*",
    "aiofiles",
    "pywebpush",
    "pywebpush.*",
    "pynvml",
    "pynvml.*",
    "psutil",
    "psutil.*",
    "faststream.*",
    "taskiq_redis",
    "taskiq_redis.*",
    "typer._click",
    "typer._click.*",
    "torch",
    "torch.*",
    "transformers",
    "transformers.*",
    "huggingface_hub",
    "huggingface_hub.*",
    "accelerate",
    "accelerate.*",
    "trafilatura",
    "trafilatura.*",
    "pymupdf",
    "fitz",
    "faster_whisper",
    "faster_whisper.*",
    "TTS",
    "TTS.*",
    "pyotp",
    "pyotp.*",
    "ort_vision_sdk",
    "ort_vision_sdk.*",
    "tempestweb",
    "tempestweb.*",
    "tempest_core",
    "tempest_core.*",
    "chromadb",
    "chromadb.*",
]
ignore_missing_imports = true

# numpy (pulled in transitively via ort-vision-sdk) ships stubs that use
# the 3.12+ ``type X = ...`` statement, which mypy rejects while targeting
# python_version 3.11. We never type-check against numpy internals, so skip
# following its stubs entirely.
[[tool.mypy.overrides]]
module = ["numpy", "numpy.*"]
follow_imports = "skip"
follow_imports_for_stubs = true
ignore_errors = true
ignore_missing_imports = true

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
python_files = ["test_*.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
addopts = [
    "-ra",
    "--strict-markers",
    "--strict-config",
    "--cov=tempest_fastapi_sdk",
    "--cov-report=term-missing",
]

[tool.coverage.run]
source = ["tempest_fastapi_sdk"]
branch = true
# Async FastAPI handlers run under anyio worker threads / greenlets when
# driven by the ASGI test client; without this the tracer misses their
# bodies and every router handler is under-reported as uncovered.
concurrency = ["thread", "greenlet"]

[tool.coverage.report]
exclude_lines = [
    "pragma: no cover",
    "raise NotImplementedError",
    "if TYPE_CHECKING:",
    "if __name__ == .__main__.:",
]
